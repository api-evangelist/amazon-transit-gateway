naftiko: 1.0.0-alpha2
info:
  label: Amazon Transit Gateway API — Transit Gateways
  description: 'Amazon Transit Gateway API — Transit Gateways. 3 operations. Lead operation: Amazon Transit Gateway Create
    a Transit Gateway. Self-contained Naftiko capability covering one Amazon Transit Gateway business surface.'
  tags:
  - Amazon Transit Gateway
  - Transit Gateways
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    AMAZON_TRANSIT_GATEWAY_API_KEY: AMAZON_TRANSIT_GATEWAY_API_KEY
capability:
  consumes:
  - type: http
    namespace: amazon-transit-gateway-transit-gateways
    baseUri: https://ec2.{region}.amazonaws.com
    description: Amazon Transit Gateway API — Transit Gateways business capability. Self-contained, no shared references.
    resources:
    - name: ?Action=CreateTransitGateway
      path: /?Action=CreateTransitGateway
      operations:
      - name: createtransitgateway
        method: GET
        description: Amazon Transit Gateway Create a Transit Gateway
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: Description
          in: query
          type: string
        - name: Options.AmazonSideAsn
          in: query
          type: integer
        - name: Options.AutoAcceptSharedAttachments
          in: query
          type: string
    - name: ?Action=DeleteTransitGateway
      path: /?Action=DeleteTransitGateway
      operations:
      - name: deletetransitgateway
        method: GET
        description: Amazon Transit Gateway Delete a Transit Gateway
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: TransitGatewayId
          in: query
          type: string
          required: true
    - name: ?Action=DescribeTransitGateways
      path: /?Action=DescribeTransitGateways
      operations:
      - name: describetransitgateways
        method: GET
        description: Amazon Transit Gateway Describe Transit Gateways
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Action
          in: query
          type: string
          required: true
        - name: TransitGatewayId
          in: query
          type: array
        - name: MaxResults
          in: query
          type: integer
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.AMAZON_TRANSIT_GATEWAY_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: amazon-transit-gateway-transit-gateways-rest
    port: 8080
    description: REST adapter for Amazon Transit Gateway API — Transit Gateways. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/action-createtransitgateway
      name: action-createtransitgateway
      description: REST surface for ?Action=CreateTransitGateway.
      operations:
      - method: GET
        name: createtransitgateway
        description: Amazon Transit Gateway Create a Transit Gateway
        call: amazon-transit-gateway-transit-gateways.createtransitgateway
        with:
          Action: rest.Action
          Description: rest.Description
          Options.AmazonSideAsn: rest.Options.AmazonSideAsn
          Options.AutoAcceptSharedAttachments: rest.Options.AutoAcceptSharedAttachments
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/action-deletetransitgateway
      name: action-deletetransitgateway
      description: REST surface for ?Action=DeleteTransitGateway.
      operations:
      - method: GET
        name: deletetransitgateway
        description: Amazon Transit Gateway Delete a Transit Gateway
        call: amazon-transit-gateway-transit-gateways.deletetransitgateway
        with:
          Action: rest.Action
          TransitGatewayId: rest.TransitGatewayId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/action-describetransitgateways
      name: action-describetransitgateways
      description: REST surface for ?Action=DescribeTransitGateways.
      operations:
      - method: GET
        name: describetransitgateways
        description: Amazon Transit Gateway Describe Transit Gateways
        call: amazon-transit-gateway-transit-gateways.describetransitgateways
        with:
          Action: rest.Action
          TransitGatewayId: rest.TransitGatewayId
          MaxResults: rest.MaxResults
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: amazon-transit-gateway-transit-gateways-mcp
    port: 9090
    transport: http
    description: MCP adapter for Amazon Transit Gateway API — Transit Gateways. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: amazon-transit-gateway-create-transit
      description: Amazon Transit Gateway Create a Transit Gateway
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-transit-gateway-transit-gateways.createtransitgateway
      with:
        Action: tools.Action
        Description: tools.Description
        Options.AmazonSideAsn: tools.Options.AmazonSideAsn
        Options.AutoAcceptSharedAttachments: tools.Options.AutoAcceptSharedAttachments
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-transit-gateway-delete-transit
      description: Amazon Transit Gateway Delete a Transit Gateway
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-transit-gateway-transit-gateways.deletetransitgateway
      with:
        Action: tools.Action
        TransitGatewayId: tools.TransitGatewayId
      outputParameters:
      - type: object
        mapping: $.
    - name: amazon-transit-gateway-describe-transit
      description: Amazon Transit Gateway Describe Transit Gateways
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: amazon-transit-gateway-transit-gateways.describetransitgateways
      with:
        Action: tools.Action
        TransitGatewayId: tools.TransitGatewayId
        MaxResults: tools.MaxResults
      outputParameters:
      - type: object
        mapping: $.
